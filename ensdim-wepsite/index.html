<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Early lang/dir detection for /ar/* routes (avoids RTL flash) -->
    <script>
      (function () {
        if (location.pathname === '/ar' || location.pathname.indexOf('/ar/') === 0) {
          document.documentElement.lang = 'ar';
          document.documentElement.dir = 'rtl';
        }
      })();
    </script>

    <!--
      Description, keywords, robots, canonical, hreflang, Open Graph, and
      Twitter Card tags are intentionally NOT hardcoded here. Every route
      renders its own SEO component (react-helmet-async), and `pnpm build`
      prerenders each route to a static HTML file with those tags already
      baked in (see scripts/prerender.ts). Duplicating them here created a
      second, conflicting set of tags that Helmet cannot remove — notably a
      canonical link always pointing at the homepage on every other page.
      Only this generic title is kept, as a pre-hydration fallback for the
      rare route build-time prerender doesn't cover yet.
    -->
    <title>ENSDIM | Human-Centered Digital Solutions</title>
    <meta name="author" content="ENSDIM" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/ensdim_icon.png" />
    <link rel="apple-touch-icon" href="/ensdim_icon.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Geographic / Local SEO -->
    <meta name="geo.region" content="EG" />
    <meta name="geo.placename" content="Egypt" />
    <meta name="ICBM" content="30.0444, 31.2357" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Analytics (loaded only when VITE_GA_MEASUREMENT_ID is set) -->
    <script>
      (function () {
        var GA_ID = '%VITE_GA_MEASUREMENT_ID%';
        if (!GA_ID || GA_ID.indexOf('%') !== -1) return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () { window.dataLayer.push(arguments); };
        window.gtag('js', new Date());
        window.gtag('config', GA_ID, { send_page_view: false });
      })();
    </script>

    <!-- Styles -->
    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
