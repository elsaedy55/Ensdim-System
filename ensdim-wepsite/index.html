<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Early lang/dir detection for /ar/* routes (avoids RTL flash) -->
    <script>
      (function () {
        if (location.pathname === '/ar' || location.pathname.indexOf('/ar/') === 0) {
          document.documentElement.lang = 'ar';
          document.documentElement.dir = 'rtl';
        }
      })();
    </script>

    <!-- Primary Meta Tags -->
    <title>ENSDIM | Human-Centered Digital Solutions</title>
    <meta name="title" content="ENSDIM | Human-Centered Digital Solutions" />
    <meta name="description" content="We build intelligent digital solutions that understand customer behavior and solve real business challenges. ENSDIM helps businesses improve conversion, customer experience, and operational clarity through intelligent digital solutions built around customer behavior and real business challenges." />
    <meta name="keywords" content="AI automation agency Egypt, AI agents Saudi Arabia, SaaS development UAE, CRM development, AI automation, business automation, digital transformation, وكالة ذكاء اصطناعي, أتمتة الأعمال, تطوير برمجيات" />
    <meta name="author" content="ENSDIM" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Canonical -->
    <link rel="canonical" href="https://ensdim.com/" />

    <!-- Language Alternates -->
    <link rel="alternate" hreflang="en" href="https://ensdim.com/" />
    <link rel="alternate" hreflang="ar" href="https://ensdim.com/" />
    <link rel="alternate" hreflang="x-default" href="https://ensdim.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/ensdim_icon.png" />
    <link rel="apple-touch-icon" href="/ensdim_icon.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ensdim.com/" />
    <meta property="og:site_name" content="ENSDIM" />
    <meta property="og:title" content="ENSDIM | Human-Centered Digital Solutions" />
    <meta property="og:description" content="We build intelligent digital solutions that understand customer behavior and solve real business challenges. ENSDIM helps businesses improve conversion, customer experience, and operational clarity through intelligent digital solutions built around customer behavior and real business challenges." />
    <meta property="og:image" content="https://ensdim.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ENSDIM - AI Automation Agency" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_SA" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ensdim" />
    <meta name="twitter:creator" content="@ensdim" />
    <meta name="twitter:title" content="ENSDIM | Human-Centered Digital Solutions" />
    <meta name="twitter:description" content="We build intelligent digital solutions that understand customer behavior and solve real business challenges. ENSDIM helps businesses improve conversion, customer experience, and operational clarity through intelligent digital solutions built around customer behavior and real business challenges." />
    <meta name="twitter:image" content="https://ensdim.com/og-image.png" />
    <meta name="twitter:image:alt" content="ENSDIM - AI Automation Agency" />

    <!-- Geographic / Local SEO -->
    <meta name="geo.region" content="EG" />
    <meta name="geo.placename" content="Egypt" />
    <meta name="ICBM" content="30.0444, 31.2357" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Analytics (loaded only when VITE_GA_MEASUREMENT_ID is set) -->
    <script>
      (function () {
        var GA_ID = '%VITE_GA_MEASUREMENT_ID%';
        if (!GA_ID || GA_ID.indexOf('%') !== -1) return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () { window.dataLayer.push(arguments); };
        window.gtag('js', new Date());
        window.gtag('config', GA_ID, { send_page_view: false });
      })();
    </script>

    <!-- Styles -->
    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
